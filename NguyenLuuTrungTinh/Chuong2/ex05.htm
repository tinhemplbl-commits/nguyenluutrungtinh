<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thể thao</title>
</head>
<body>

<div style="border:1px solid black; padding:10px; width:600px;">

    <h1 style="color:red; font-family:Verdana;">
        PHIẾU ĐĂNG KÝ DỰ THI THỂ THAO
    </h1>

    Họ tên: <input type="text"><br><br>
    Mật khẩu: <input type="password"><br><br>

    Môn thể thao:<br>
    <input type="checkbox"> Bóng đá<br>
    <input type="checkbox"> Bóng chuyền<br>
    <input type="checkbox"> Điền kinh<br>
    <input type="checkbox"> Bơi lội<br><br>

    Thiết bị:
    <select>
        <option>CPU</option>
        <option>Mainboard</option>
        <option>RAM</option>
    </select>
    <br><br>

    Thời gian bảo hành:
    <select>
        <option>1 năm</option>
        <option>2 năm</option>
    </select>
    <br><br>

    <input type="submit">
    <input type="reset">

</div>

</body>
</html>
