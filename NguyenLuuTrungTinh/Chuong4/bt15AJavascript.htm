script>
function CapNhat(){
document.title = tieuDe.value;
document.bgColor = mauNen.value;
document.fgColor = mauChu.value;
}
</script>

<input id="tieuDe" placeholder="Tiêu đề">
<input id="mauNen" placeholder="Màu nền">
<input id="mauChu" placeholder="Màu chữ">

<button onclick="CapNhat()">Thay đổi</button>
