<!DOCTYPE html>
<html>
<head>
<title>Mở trang web</title>
<meta charset="utf-8">
</head>
<body>
<script>
var LuaChon;
LuaChon = prompt("Nhập số để mở trang web (1,2,3):", "");

switch (LuaChon) {
case "1":
window.open("http://blu.edu.vn");
break;
case "2":
window.open("http://ctu.edu.vn");
break;
case "3":
window.open("https://vndoc.com");
break;
default:
window.open("https://meta.vn");
}
</script>
</body>
</html>
