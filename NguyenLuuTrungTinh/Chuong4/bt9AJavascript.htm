<!DOCTYPE html>
<html>
<head>
<title>Sắp xếp mảng</title>
<meta charset="utf-8">
</head>
<body>
<script>
var SoLuong, i;
var DS = [];

SoLuong = prompt("Bạn cần nhập bao nhiêu người:", 5);

for (i = 0; i < SoLuong; i++) {
DS[i] = prompt("Nhập họ tên:", "");
}

// Sắp xếp
DS.sort();

document.write("<h2>Danh sách đã sắp xếp:</h2>");

for (i = 0; i < DS.length; i++) {
document.write(DS[i] + "<br>");
}
</script>
</body>
</html>
